version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: startoil-db
    environment:
      POSTGRES_DB: ${DB_NAME:-startoil}
      POSTGRES_USER: ${DB_USER:-startoil_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-startoil_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - startoil-network

  # Node.js REST API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: startoil-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-startoil_user}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-startoil}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key}
      API_URL: http://api:3000
      CORS_ORIGINS: http://localhost:3001,http://localhost:5173,https://${DOMAIN:-manager.gasstation.local}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-noreply@gasstation.local}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      ENABLE_AUDIT_LOG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - startoil-network

  # React Frontend
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: startoil-app
    environment:
      VITE_API_URL: /api
      VITE_APP_NAME: StarOil Manager
      VITE_ENABLE_OFFLINE_MODE: "true"
    depends_on:
      - api
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "3001:80"
    restart: unless-stopped
    networks:
      - startoil-network

  # Nginx Reverse Proxy & SSL Termination
  nginx:
    image: nginx:1.25-alpine
    container_name: startoil-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/dist:/var/www/html:ro
    depends_on:
      - api
      - app
    restart: unless-stopped
    networks:
      - startoil-network
    environment:
      - DOMAIN=${DOMAIN:-manager.gasstation.local}

volumes:
  postgres_data:
    driver: local

networks:
  startoil-network:
    driver: bridge
